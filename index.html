<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas - Motivación</title>
    <meta name="theme-color" content="#FFD700">
    <style>
        :root {
            --primary: #FFD700; /* Dorado energía */
            --dark: #1a1a1a;
            --light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #quote-container {
            font-size: 1.5rem;
            font-style: italic;
            margin: 30px 0;
            min-height: 80px;
            transition: transform 0.3s;
        }

        .btn-boost {
            background-color: var(--primary);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .btn-boost:active {
            transform: scale(0.95);
        }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(255, 215, 0, 0.7); }
            100% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="logo-placeholder">
            <h2 style="color: var(--primary);">⚡</h2>
        </div>
        <h1>¡PALANTE!</h1>
        <div id="quote-container">
            "No desisto, siempre persisto e insisto."
        </div>
        <button class="btn-boost pulse" onclick="newQuote()">¡DAME VIBRAS!</button>
    </div>

    <footer>
        App desarrollada por <strong>Vibras Positivas (3117700431)</strong> derechos de autor.
    </footer>

    <script>
        const quotes = [
            "El éxito es la suma de pequeños esfuerzos repetidos día tras día.",
            "Si no desistes, el universo no tiene otra opción que conspirar a tu favor.",
            "Insiste, persiste y nunca desistas. ¡Tu meta está cerca!",
            "Las vibras positivas atraen resultados extraordinarios.",
            "Hoy es un gran día para ganarle a la excusa de ayer.",
            "Tu mentalidad es tu mayor activo. ¡Mantenla en alto!",
            "Vibras Positivas: Donde la energía se convierte en acción."
        ];

        function newQuote() {
            const container = document.getElementById('quote-container');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            
            // Efecto de cambio
            container.style.opacity = 0;
            setTimeout(() => {
                container.innerText = `"${quotes[randomIndex]}"`;
                container.style.opacity = 1;
            }, 300);
        }

        // Registro de Service Worker para PWA (Simulado)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                console.log('PWA Lista para funcionar offline');
            });
        }
    </script>
</body>
</html>
