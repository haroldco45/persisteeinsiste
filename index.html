<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas - PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <style>
        :root { --primary: #FFD700; --dark: #121212; --card: #1e1e1e; --text: #f5f5f5; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--dark);
            color: var(--text); margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; text-align: center;
        }
        .main-card {
            background: var(--card); padding: 40px 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; width: 90%;
            border: 1px solid rgba(255, 215, 0, 0.2); animation: fadeIn 0.8s ease-out;
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin: 15px 0; }
        #quote-display {
            font-size: 1.3rem; line-height: 1.6; margin: 30px 0; min-height: 120px;
            display: flex; align-items: center; justify-content: center; transition: opacity 0.4s;
        }
        .btn-vibras {
            background: var(--primary); color: #000; border: none; padding: 18px 35px;
            font-size: 1.1rem; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); transition: 0.3s;
        }
        .btn-vibras:active { transform: scale(0.9); }
        footer { margin-top: 40px; font-size: 0.85rem; color: #888; }
        .highlight { color: var(--primary); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div style="font-size: 4rem;">⚡</div>
        <h1>¡VAMOS PALANTE!</h1>
        <div id="quote-display">Cargando vibras...</div>
        <button class="btn-vibras" onclick="getNewVibe()">¡DAME ENERGÍA!</button>
    </div>

    <footer>
        App desarrollada por <br>
        <strong class="highlight">Vibras Positivas (3117700431)</strong> <br>
        Derechos de autor &copy; 2026
    </footer>

    <script>
        let frases = [];

        async function cargarFrases() {
            try {
                const res = await fetch('frases.json');
                frases = await res.json();
                getNewVibe(); // Mostrar la primera frase al cargar
            } catch (e) {
                document.getElementById('quote-display').innerText = '"No desisto, siempre persisto e insisto."';
            }
        }

        function getNewVibe() {
            const display = document.getElementById('quote-display');
            if (frases.length === 0) return;
            display.style.opacity = '0';
            setTimeout(() => {
                const random = frases[Math.floor(Math.random() * frases.length)];
                display.innerText = `"${random}"`;
                display.style.opacity = '1';
            }, 400);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
                cargarFrases();
            });
        }
    </script>
</body>
</html>
